<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Mor Alaçatı</title>

  <!-- ============================================================
       AYARLAR — buradaki linkleri kendine göre değiştir

  <script>
    window.SITE_CONFIG = {
      // Menü tuşu PDF menüyü açar.
      // (HTML menü kaynağı menu.html — PDF buradan üretilir.)
      menuUrl: "menu.pdf",

      // Instagram profil adresin:
      instagramUrl: "https://instagram.com/moralacati",

      // WhatsApp / rezervasyon numarası (başında ülke kodu, boşluk/sembol olmadan):
      whatsappPhone: "905406673535",
      whatsappText: "Merhaba, rezervasyon yapmak istiyorum."
    };
  </script>

  <style>
    :root {
      --mor-deep:   #211328;
      --mor-main:   #2B1738;
      --mor-soft:   #6B4A82;
      --mor-light:  #A996B8;
      --cream:      #E8DFEC;
      --white:      #FFFFFF;
      --font-serif: "Helvetica Neue", "Helvetica", "Arial", sans-serif;
      --font-display: "Helvetica Neue", "Helvetica", "Arial", sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; }

    body {
      min-height: 100dvh;
      font-family: var(--font-serif);
      color: var(--white);
      background:
        radial-gradient(120% 80% at 50% -10%, #3a2148 0%, transparent 60%),
        linear-gradient(180deg, #2B1738 0%, #211328 55%, #160b1c 100%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(36px, env(safe-area-inset-top)) 24px max(36px, env(safe-area-inset-bottom));
    }

    /* dekoratif yumuşak ışık */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(60% 40% at 50% 18%, rgba(169,150,184,.18), transparent 70%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: auto 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ---------- Logo ---------- */
    .logo {
      width: 260px;
      max-width: 78vw;
      height: auto;
      margin-bottom: 18px;
      filter: drop-shadow(0 6px 24px rgba(0,0,0,.35));
      animation: rise .8s ease both;
    }

    .tagline {
      font-family: var(--font-display);
      font-weight: 500;
      letter-spacing: .28em;
      text-transform: uppercase;
      font-size: 13px;
      color: var(--mor-light);
      margin-bottom: 44px;
      animation: rise .8s .1s ease both;
    }

    /* ---------- Butonlar ---------- */
    .actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px 22px;
      border: 1px solid rgba(169,150,184,.35);
      border-radius: 16px;
      background: rgba(255,255,255,.04);
      color: var(--white);
      font-family: var(--font-serif);
      font-size: 18px;
      letter-spacing: .04em;
      text-decoration: none;
      backdrop-filter: blur(6px);
      transition: transform .15s ease, background .2s ease, border-color .2s ease;
      animation: rise .8s ease both;
    }
    .btn:active { transform: scale(.97); }
    .btn:nth-child(1) { animation-delay: .18s; }
    .btn:nth-child(2) { animation-delay: .26s; }
    .btn:nth-child(3) { animation-delay: .34s; }

    .btn svg { width: 22px; height: 22px; flex: none; }

    /* Menü = ana/öne çıkan buton */
    .btn--primary {
      background: linear-gradient(180deg, #7a5694 0%, #5d3f76 100%);
      border-color: transparent;
      font-size: 19px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .btn--primary:hover { background: linear-gradient(180deg, #835ea0 0%, #654681 100%); }

    .btn--ig:hover, .btn--wa:hover {
      background: rgba(255,255,255,.09);
      border-color: rgba(169,150,184,.6);
    }

    .address {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-top: 36px;
      padding: 0 8px;
      font-size: 13px;
      line-height: 1.45;
      letter-spacing: .02em;
      color: rgba(232,223,236,.7);
      text-decoration: none;
      text-align: left;
      transition: color .2s ease;
      animation: rise .8s .45s ease both;
    }
    .address:hover { color: var(--white); }
    .address svg { width: 18px; height: 18px; flex: none; color: var(--mor-light); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="assets/logo-white.png" alt="Mor Alaçatı" />
    <p class="tagline">Restaurant &amp; Lounge</p>

    <nav class="actions">
      <a class="btn btn--primary" id="menuBtn" href="#" target="_blank" rel="noopener">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16v16H4z" opacity=".0"/>
          <path d="M7 7h10M7 12h10M7 17h6"/>
        </svg>
        Menü

        </svg>
        Instagram
      </a>

      <a class="btn btn--wa" id="waBtn" href="#" target="_blank" rel="noopener">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.5 14.38c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.96-.94 1.16-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51-.17-.01-.37-.01-.57-.01-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.06 2.88 1.21 3.08.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.62.71.23 1.36.2 1.87.12.57-.08 1.76-.72 2-1.41.25-.69.25-1.28.17-1.41-.07-.13-.27-.2-.57-.35zM12.05 21.5a9.4 9.4 0 0 1-4.8-1.32l-.34-.2-3.57.94.95-3.48-.22-.36a9.43 9.43 0 1 1 8 4.42zM12.06 2.2a11.21 11.21 0 0 0-9.55 17.13L1 23.5l4.27-1.12a11.2 11.2 0 1 0 6.79-20.18z"/>
        </svg>
        WhatsApp
      </a>
    </nav>

    <a class="address" href="https://maps.google.com/?q=Alaçatı+Mah.+1031+Sk.+No:1+Çeşme+İzmir" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11z"/>
        <circle cx="12" cy="10" r="2.5"/>
      </svg>
      <span>Alaçatı Mah. 1031 Sk. No: 1 Çeşme / İzmir</span>
    </a>
  </main>

  <script>
    (function () {
      var c = window.SITE_CONFIG;
      document.getElementById("menuBtn").href = c.menuUrl;
      document.getElementById("igBtn").href = c.instagramUrl;
      document.getElementById("waBtn").href =
        "https://wa.me/" + c.whatsappPhone +
        "?text=" + encodeURIComponent(c.whatsappText || "");
    })();
  </script>
</body>
</html>
